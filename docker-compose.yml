version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://codezone:codezone_password@postgres:5432/codezone
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev-secret-key-change-in-production
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:4000
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=codezone
      - POSTGRES_PASSWORD=codezone_password
      - POSTGRES_DB=codezone
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
