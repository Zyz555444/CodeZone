services:
  # ============================================
  # 前端 + 后端统一服务
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: codezone:latest
    container_name: codezone-app
    ports:
      - "12321:12321"
      - "10101:10101"
    environment:
      # 数据库配置
      - DATABASE_URL=postgresql://codezone:codezone_password@postgres:5432/codezone
      # Redis 配置
      - REDIS_URL=redis://redis:6379
      # JWT 配置
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-change-in-production}
      - JWT_EXPIRES_IN=7d
      # 前端 API 配置
      - NEXT_PUBLIC_API_URL=http://localhost:10101/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:10101
      # 服务器配置
      - PORT=10101
      - FRONTEND_PORT=12321
      - NODE_ENV=production
      - LOG_LEVEL=info
      # 性能优化
      - NODE_OPTIONS=--max-old-space-size=512
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - codezone-network
    restart: unless-stopped
    init: true
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10101/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================
  # PostgreSQL 数据库
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: codezone-postgres
    environment:
      - POSTGRES_USER=codezone
      - POSTGRES_PASSWORD=codezone_password
      - POSTGRES_DB=codezone
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - codezone-network
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codezone -d codezone"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================
  # Redis 缓存
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: codezone-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - codezone-network
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# ============================================
# 网络和卷
# ============================================
networks:
  codezone-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
