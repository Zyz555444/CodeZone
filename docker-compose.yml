services:
  # ============================================
  # 前端服务
  # ============================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    image: codezone:frontend
    container_name: codezone-frontend
    ports:
      - "12321:12321"
    environment:
      - NODE_ENV=production
      - PORT=12321
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_WS_URL=ws://backend:10101
    depends_on:
      backend:
        condition: service_started
    networks:
      - codezone-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:12321"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # 后端服务
  # ============================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    image: codezone:backend
    container_name: codezone-backend
    ports:
      - "10101:10101"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-codezone}:${DB_PASSWORD:-codezone_password}@postgres:5432/${DB_NAME:-codezone}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-change-in-production}
      - JWT_EXPIRES_IN=7d
      - PORT=10101
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=512
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - codezone-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10101/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # PostgreSQL 数据库
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: codezone-postgres
    environment:
      - POSTGRES_USER=${DB_USER:-codezone}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-codezone_password}
      - POSTGRES_DB=${DB_NAME:-codezone}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - codezone-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-codezone} -d ${DB_NAME:-codezone}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================
  # Redis 缓存
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: codezone-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - codezone-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# ============================================
# 网络和卷
# ============================================
networks:
  codezone-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
